# Netlify deployment configuration for PEOPLElogy AI Readiness Assessment

[build]
  # Directory to publish (Vite outputs here by default)
  publish = "dist"
  # Build command
  command = "npm run build"

[build.environment]
  # Node version
  NODE_VERSION = "18"

# SPA redirect — sends all routes to index.html (React Router handles routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
